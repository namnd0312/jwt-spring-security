# spring-boot-docker/docker-compose.yml
services:
  postgres-service:
    image: 'postgres:16-alpine'
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - my-net
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
  redis-service:
    image: 'redis:7-alpine'
    ports:
      - "6379:6379"
    networks:
      - my-net
    restart: unless-stopped
  ms-authentication-service:
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    networks:
      - my-net
    depends_on:
      - postgres-service
      - redis-service
#  angular:
#    image: angular-test
#    ports:
#      - "4200:80"
#    expose:
#      - "80"
#    networks:
#      - my-net
networks:
  my-net:
    driver: bridge

volumes:
  postgres-data: